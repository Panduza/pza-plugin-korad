[package]
name = "pza-plugin-korad"
edition = "2021"

[lib]
path = "src/lib.rs"
crate-type = ["cdylib"]


[dependencies]

panduza-platform-core = { git = "https://github.com/Panduza/panduza-platform-core", rev="75adb5fa4216d4796b476fb713229e6116c4159f", features = [
     "log",
     "serial",
 ] }

# The panduza connectors library
# Main async framework for the platform
tokio = { version = "1", features = ["full", "tracing"] }
# Json serialization & deserialization
serde_json = "1.0.114"
# Async trait support
async-trait = "0.1.77"
# Futures support
futures = "0.3.17"


[build-dependencies]
prost-build = { version = "0.13.1" }

[package.metadata.cargo-post.dependencies]

panduza-platform-core = { git = "https://github.com/Panduza/panduza-platform-core", rev="75adb5fa4216d4796b476fb713229e6116c4159f", features = [
     "log",
 ] }

[features]

# Enable tracing in stdout
log = []
